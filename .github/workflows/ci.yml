name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Права задаёт caller — reusable расширить их не может; без actions:read падает nx-set-shas.
# packages:read обязателен: явный permissions-блок ОБНУЛЯЕТ неперечисленное, а без него
# pnpm install ловит 403 на @omnifield/* даже с публичными пакетами (грабля сниппета брифа).
permissions:
  contents: read
  actions: read
  packages: read

jobs:
  # Node-контур — reusable devopser (skeleton D1): hygiene (sherif) + nx affected +
  # drift-check вендоренных skeleton-копий. Тулчейн-пины — из нашего package.json.
  node:
    uses: omnifield/devopser/.github/workflows/node-ci.yml@main

  # Python-контур локальный: reusable python-ci появится need-driven — при втором
  # python-потребителе экосистемы (решение devopser briefs/consumer-brainer.md).
  python:
    name: Python (ruff + pytest, ${{ matrix.pkg }})
    runs-on: ubuntu-latest
    strategy:
      # Каждый python-пакет workspace — свой прогон: пакет без прогона в CI = невидимая дыра.
      matrix:
        pkg: [backend, kernel]
    defaults:
      run:
        working-directory: packages/${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v7
      # Версия uv — под required-version root pyproject.toml; CPython — из .python-version.
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.x"
          enable-cache: true
      - name: Sync deps (uv + dev group)
        run: uv sync --dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q

name: PR title

# Semantic-гейт заголовка PR — reusable devopser (skeleton D1); наш прежний конфиг
# взят каноном экосистемы, поэтому дефолты reusable = наш конфиг 1:1.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# Дефолтный GITHUB_TOKEN репо урезан — экшену нужно явное чтение PR.
permissions:
  pull-requests: read

jobs:
  semantic:
    uses: omnifield/devopser/.github/workflows/pr-title.yml@main

name: PR title

# Гейтит заголовок PR по Conventional Commits: GitHub squash-merge берёт заголовок
# PR как commit subject — сигнал должен быть машиночитаемым (канон commit-каденса).

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# Дефолтный GITHUB_TOKEN репо урезан — экшену нужно явное чтение PR.
permissions:
  pull-requests: read

jobs:
  semantic:
    name: Semantic PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            chore
            build
            ci
            test
            perf
            style
            revert
          requireScope: false
          # Subject с маленькой буквы: "feat(backend): add x", не "Add x".
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The PR title subject "{subject}" must start with a lowercase letter.
            Example: "feat(backend): add session stop" (not "Add session stop").

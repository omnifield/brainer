# omnifield-brainer-bridge — agent = live participant of a chater room (Step 1: one agent, one room).
# Standalone runnable (flat `bridge/` package, mirrors backend's layout). Deliberately обособленный:
# no dep on kernel/backend — it only speaks chater's public v0 API. Folds into kernel/orchestrator
# later by `git mv`, not rewrite (see ARCHITECTURE.md раскладка).

[project]
name = "omnifield-brainer-bridge"
version = "0.1.0"
description = "Bridge: agent as a live participant of a chater room over chater's public v0 API (Step 1)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "websockets>=13",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.12",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.uv]
# App, not a library: don't build/install the package into its own env (backend does the same).
package = false

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
